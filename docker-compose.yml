version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: zorvyn-postgres
    environment:
      POSTGRES_DB: finance_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: zorvyn-app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/finance_dashboard
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ChangeThisToAVeryLongSecureSecretKeyInProductionMinimum512Bits

volumes:
  postgres_data:

