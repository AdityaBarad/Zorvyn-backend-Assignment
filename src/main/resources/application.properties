server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/finance_dashboard}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=${JWT_SECRET:MyVeryLongSecureSecretKeyForJWTSigningThatIsAtLeast512BitsLongAndShouldBeChangedInProduction}
jwt.access-token-expiry-ms=900000
jwt.refresh-token-expiry-ms=604800000

logging.level.root=INFO
logging.level.com.example.zorvyn=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/zorvyn.log

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method

spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8

